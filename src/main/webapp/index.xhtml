<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">

<h:head>
    <title>GhostNet Management</title>
</h:head>

<h:body>
    <h1>GhostNet Management</h1>

    <h2>Geisternetz melden</h2>

    <h:form>
        <p>
            Breitengrad:
            <h:inputText id="latitude"
                         value="#{ghostNetBean.ghostNet.latitude}"
                         required="true"
                         requiredMessage="Breitengrad ist Pflicht!">
                <f:validateDoubleRange minimum="-90" maximum="90" />
            </h:inputText>
            <h:message for="latitude" />
        </p>

        <p>
            Längengrad:
            <h:inputText id="longitude"
                         value="#{ghostNetBean.ghostNet.longitude}"
                         required="true"
                         requiredMessage="Längengrad ist Pflicht!">
                <f:validateDoubleRange minimum="-180" maximum="180" />
            </h:inputText>
            <h:message for="longitude" />
        </p>

        <p>
            Geschätzte Größe:
            <h:inputText id="size"
                         value="#{ghostNetBean.ghostNet.size}"
                         required="true"
                         requiredMessage="Größe ist Pflicht!">
                <f:validateDoubleRange minimum="0" />
            </h:inputText>
            <h:message for="size" />
        </p>

        <h:commandButton value="Geisternetz melden"
                         action="#{ghostNetBean.createGhostNet}" />
    </h:form>

    <h2>Gemeldete Geisternetze</h2>

    <h:dataTable value="#{ghostNetBean.ghostNets}" var="net" border="1">
        <h:column>
            <f:facet name="header">ID</f:facet>
            #{net.id}
        </h:column>

        <h:column>
            <f:facet name="header">Breitengrad</f:facet>
            #{net.latitude}
        </h:column>

        <h:column>
            <f:facet name="header">Längengrad</f:facet>
            #{net.longitude}
        </h:column>

        <h:column>
            <f:facet name="header">Größe</f:facet>
            #{net.size}
        </h:column>

        <h:column>
            <f:facet name="header">Status</f:facet>
            #{net.status}
        </h:column>
    </h:dataTable>

</h:body>
</html>

<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html">
<h:head>
    <title>GhostNet Management</title>
</h:head>

<h:body>
    <h1>GhostNet Management</h1>

    <h2>Geisternetz melden</h2>

    <h:form>
        <p>
            Breitengrad:
            <h:inputText value="#{ghostNetBean.ghostNet.latitude}" />
        </p>

        <p>
            Längengrad:
            <h:inputText value="#{ghostNetBean.ghostNet.longitude}" />
        </p>

        <p>
            Geschätzte Größe:
            <h:inputText value="#{ghostNetBean.ghostNet.size}" />
        </p>

        <h:commandButton value="Geisternetz melden"
                         action="#{ghostNetBean.createGhostNet}" />
    </h:form>
</h:body>
</html>
